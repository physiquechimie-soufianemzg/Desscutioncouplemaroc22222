<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>حبّان · لعبة التوافق</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--card:#141414;--border:#262626;--rose:#e11d48;--rose-light:#fb7185;--rose-dark:#9f1239;--text:#f5f5f5;--text2:#a3a3a3;--green:#22c55e;--red:#ef4444;--blue:#3b82f6}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Segoe UI',Tahoma,Arial,sans-serif;direction:rtl}
#app{width:100%;height:100dvh;overflow:hidden;position:relative}
#toasts{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:#1e1e1e;color:var(--text);padding:10px 20px;border-radius:10px;font-size:14px;opacity:0;transform:translateY(-10px);transition:all .3s;pointer-events:auto;border:1px solid var(--border)}
.toast.show{opacity:1;transform:translateY(0)}
.screen{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;position:absolute;top:0;left:0}
/* Login */
#loginScreen{background:radial-gradient(ellipse at center,#1a0a10 0%,var(--bg) 70%)}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px 24px;width:100%;max-width:360px;text-align:center}
.login-card h1{font-size:28px;margin-bottom:8px;background:linear-gradient(135deg,var(--rose-light),var(--rose));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-card p{color:var(--text2);font-size:14px;margin-bottom:24px}
.login-card input{width:100%;padding:12px 16px;border-radius:12px;border:1px solid var(--border);background:#1a1a1a;color:var(--text);font-size:16px;outline:none;text-align:center;font-family:inherit;margin-bottom:16px;direction:ltr}
.btn{padding:12px 24px;border-radius:12px;border:none;font-size:15px;cursor:pointer;font-family:inherit;transition:all .2s}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--rose);color:#fff}
.btn-primary:hover:not(:disabled){background:var(--rose-dark)}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-outline:hover{border-color:var(--rose)}
/* Welcome */
.welcome-text{font-size:22px;color:var(--text);text-align:center;line-height:2;padding:0 20px;animation:fadeInUp .8s ease}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.flower-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;padding:20px;max-width:300px}
.flower-item{font-size:48px;text-align:center;animation:fadeInUp .6s ease both}
.flower-item:nth-child(1){animation-delay:.1s}.flower-item:nth-child(2){animation-delay:.2s}
.flower-item:nth-child(3){animation-delay:.3s}.flower-item:nth-child(4){animation-delay:.4s}
.flower-item:nth-child(5){animation-delay:.5s}.flower-item:nth-child(6){animation-delay:.6s}
.flower-item:nth-child(7){animation-delay:.7s}.flower-item:nth-child(8){animation-delay:.8s}
.flower-item:nth-child(9){animation-delay:.9s}
.floating-petal{position:absolute;font-size:24px;animation:floatPetal linear infinite;opacity:.6;pointer-events:none;z-index:0}
@keyframes floatPetal{0%{transform:translateY(-20px) rotate(0deg);opacity:0}10%{opacity:.6}90%{opacity:.6}100%{transform:translateY(100vh) rotate(360deg);opacity:0}}
/* Lobby */
.lobby-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px 24px;text-align:center;width:100%;max-width:360px}
.lobby-card h2{font-size:28px;margin-bottom:4px;background:linear-gradient(135deg,var(--rose-light),var(--rose));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.partner-name{font-size:20px;color:var(--text2);margin:16px 0 8px}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-left:6px}
.status-dot.online{background:var(--green)}
.status-dot.offline{background:var(--red)}
.conn-status{font-size:11px;color:var(--text2);margin-top:16px;opacity:.7}
/* Game */
.game-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0;min-height:48px}
.game-header .q-num{font-size:14px;font-weight:bold;color:var(--text)}
.game-header .q-cat{font-size:12px;color:var(--text2)}
.leave-btn{background:transparent;border:1px solid var(--red);color:var(--red);padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .2s}
.leave-btn:hover{background:var(--red);color:#fff}
.game-body{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.game-footer{padding:12px 16px;background:var(--card);border-top:1px solid var(--border);flex-shrink:0}
.question-text{font-size:18px;line-height:2;margin-bottom:20px;color:var(--text)}
.options-grid{display:flex;flex-direction:column;gap:10px}
.option-btn{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:12px;border:2px solid var(--border);background:var(--card);color:var(--text);font-size:15px;cursor:pointer;text-align:right;transition:all .2s;font-family:inherit;line-height:1.6;width:100%}
.option-btn:hover{border-color:rgba(225,29,72,.4);background:rgba(225,29,72,.05)}
.option-btn.selected{border-color:var(--rose);background:rgba(225,29,72,.1)}
.opt-letter{width:28px;height:28px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:bold;flex-shrink:0;color:var(--text2)}
.option-btn.selected .opt-letter{background:var(--rose);color:#fff}
.waiting-card{padding:16px 0;text-align:center}
.waiting-status{display:flex;justify-content:center;gap:32px;margin-top:12px}
.ws-item{display:flex;flex-direction:column;align-items:center;gap:6px}
.ws-icon{font-size:24px}
.ws-label{font-size:13px;color:var(--text2)}
/* Reveal */
.match-indicator{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 20px;border-radius:10px;font-size:16px;font-weight:bold;margin-bottom:16px}
.match-indicator.matched{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.2)}
.match-indicator.differed{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.reveal-card{display:flex;gap:12px;margin-bottom:16px}
.reveal-col{flex:1;padding:14px;border-radius:12px;text-align:center}
.me-col{background:rgba(225,29,72,.08);border:1px solid rgba(225,29,72,.15)}
.partner-col{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.15)}
.reveal-col .who{font-size:12px;color:var(--text2);margin-bottom:6px}
.reveal-col .ans{font-size:13px;line-height:1.7;color:var(--text)}
/* Chat */
.chat-section{margin-top:12px;display:flex;flex-direction:column;gap:8px;flex:1;min-height:0}
.chat-section h4{font-size:14px;color:var(--text2);flex-shrink:0}
#gameChatMsgs{flex:1;overflow-y:auto;min-height:80px;max-height:200px;display:flex;flex-direction:column;gap:6px;padding:4px 0}
.chat-bubble{max-width:80%;padding:8px 12px;border-radius:14px;font-size:13px;line-height:1.6;position:relative}
.chat-bubble.me{background:rgba(225,29,72,.15);align-self:flex-start;border-bottom-right-radius:4px}
.chat-bubble.them{background:rgba(59,130,246,.1);align-self:flex-end;border-bottom-left-radius:4px}
.chat-name{font-size:10px;color:var(--text2);margin-bottom:2px}
.chat-time{font-size:9px;color:var(--text2);margin-top:2px;text-align:left;opacity:.7}
.chat-input-bar{display:flex;gap:8px;align-items:center;flex-shrink:0}
.chat-send-btn{width:38px;height:38px;border-radius:50%;border:none;background:var(--green);color:#fff;font-size:16px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.chat-send-btn:hover{background:#16a34a;transform:scale(1.05)}
/* Emoji */
.emoji-picker{max-height:0;overflow:hidden;transition:max-height .3s ease}
.emoji-picker.open{max-height:220px;overflow-y:auto}
.emoji-cat{margin-bottom:10px}
.emoji-cat-title{font-size:11px;color:var(--text2);margin-bottom:6px}
.emoji-grid{display:flex;flex-wrap:wrap;gap:4px}
.emoji-grid span{font-size:22px;cursor:pointer;padding:4px;border-radius:6px;transition:background .15s}
.emoji-grid span:hover{background:rgba(255,255,255,.1)}
/* Invite popup */
.invite-popup{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:200}
.invite-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px 24px;text-align:center;max-width:320px;width:90%;animation:fadeInUp .4s ease}
.invite-card h3{font-size:22px;margin-bottom:8px;color:var(--rose-light)}
.invite-card p{color:var(--text2);margin-bottom:24px}
.invite-btns{display:flex;gap:12px;justify-content:center}
/* Summary */
.summary-card{text-align:center;padding:20px 0}
.summary-pct{font-size:64px;font-weight:bold;background:linear-gradient(135deg,var(--rose-light),var(--rose));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.summary-label{font-size:16px;color:var(--text2);margin-bottom:24px}
.summary-msg{font-size:16px;line-height:1.8;margin-bottom:24px;padding:16px;background:rgba(225,29,72,.08);border-radius:12px;border:1px solid rgba(225,29,72,.15)}
.stat-boxes{display:flex;gap:12px;justify-content:center;margin-bottom:24px}
.stat-box{flex:1;padding:14px;border-radius:12px;text-align:center}
.stat-box .stat-val{font-size:24px;font-weight:bold}
.stat-box .stat-lbl{font-size:12px;color:var(--text2);margin-top:4px}
.stat-box.green{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2)}
.stat-box.green .stat-val{color:var(--green)}
.stat-box.red{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2)}
.stat-box.red .stat-val{color:var(--red)}
.stat-box.blue{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2)}
.stat-box.blue .stat-val{color:var(--blue)}
/* Connecting */
.connecting-text{font-size:18px;color:var(--text2);animation:pulse 1.5s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
/* Responsive */
@media(max-width:380px){.question-text{font-size:16px}.option-btn{padding:12px 14px;font-size:14px}}
</style>
</head>
<body>
<div id="app"></div>
<div id="toasts"></div>
<script>

/* ─── Helpers ─── */
function h(tag, attrs, children) {
  var el = document.createElement(tag);
  if (attrs) {
    for (var k in attrs) {
      var v = attrs[k];
      if (k === 'class') el.className = v;
      else if (k === 'style') el.style.cssText = v;
      else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
      else if (v === false || v == null) continue;
      else if (v === true) el.setAttribute(k, '');
      else el.setAttribute(k, v);
    }
  }
  var kids = Array.isArray(children) ? children : (children != null ? [children] : []);
  for (var i = 0; i < kids.length; i++) {
    var c = kids[i];
    if (c == null || c === false) continue;
    if (typeof c === 'string' || typeof c === 'number') el.appendChild(document.createTextNode(c));
    else el.appendChild(c);
  }
  return el;
}

function clearApp() { document.getElementById('app').innerHTML = ''; }

function showToast(msg) {
  var t = h('div', {class: 'toast'}, msg);
  document.getElementById('toasts').appendChild(t);
  setTimeout(function(){ t.classList.add('show'); }, 10);
  setTimeout(function(){ t.classList.remove('show'); setTimeout(function(){ t.remove(); }, 300); }, 3000);
}

/* ─── Users ─── */
var USERS = {
  soukaina2002: { displayName: '\u0633\u0643\u064A\u0646\u0629', gender: 'female', partner: 'soufiane1996' },
  soufiane1996: { displayName: '\u0633\u0641\u064A\u0627\u0646', gender: 'male', partner: 'soukaina2002' }
};

/* ─── Questions ─── var ALL_QUESTIONS = [{"id":"c1","cat":"المغامرات والتجارب","q":"النشاط الذي تتمنى تجربته مع {{زوج}} لأول مرة هو","opts":["الغوص في أعماق البحر","تسلق قمة جبل","التخييم تحت النجوم","ركوب الخيل على الشاطئ"]},{"id":"c2","cat":"المستقبل معاً","q":"أكثر ما تتمنى تحقيقه مع {{الإنسان}} خلال السنوات الخمس القادمة هو","opts":["بيت جديد تعيشان فيه","مشروع مشترك تبنيانه معاً","سفر كبير حول العالم","عائلة صغيرة سعيدة"]},{"id":"c3","cat":"المستقبل معاً","q":"المشروع الذي تحلم أن تبدأه مع {{شريك}} هو","opts":["كتابة كتاب معاً","هواية مشتركة تمارسانها","مشروع تجاري خاص","تأسيس عمل خيري"]},{"id":"c4","cat":"الجمال والأناقة","q":"اللحظة التي يبدو فيها {{زوج}} في أجمل حالاته هي","opts":["في الصباح عند الاستيقاظ","في المناسبات والأعراس","عندما يكون مرتاحاً وعفوياً","عندما يضحك من قلبه"]},{"id":"c5","cat":"المفاجآت والهدايا","q":"أفضل مفاجأة يمكن أن يقدمها لك {{الإنسان}} هي","opts":["موقف رومانسي غير متوقع","هدية اختارها بعناية","كلمة حب في وقتها","تخطيط ليوم كامل من أجلك"]},{"id":"c6","cat":"الرومانسية والحب","q":"أكثر عبارة رومانسية تحب أن تسمعها من {{حبيب}} هي","opts":["أنت أجمل شيء حصل في حياتي","أنت حياتي كلها","أنا محظوظ لأنك معي","لا أتخيل حياتي بدونك"]},{"id":"c7","cat":"الرومانسية والحب","q":"أكثر شيء رومانسي تتمنى تقديمه لـ{{زوج}} هو","opts":["وقت غير متوقع تقضيانه معاً","تفاجئه بطبخة يحبها","رسالة مكتوبة بخط يدك","هدية بسيطة تحمل معنى كبير"]},{"id":"c8","cat":"المشاعر والعواطف","q":"عندما ينظر إليك {{الإنسان}} بصمت، تشعر بـ","opts":["طمأنينة ودفء في القلب","انتماء عميق لروحه","حب يتجدد كل مرة","سعادة لا توصف"]},{"id":"c9","cat":"الإعجاب والتقدير","q":"أكثر ما يجعلك تشكر الله على وجود {{حبيب}} في حياتك هو","opts":["وجوده بحد ذاته نعمة","حبه الصادق وعطائه","أخلاقه وطبعه الحسن","إخلاصه ووفاؤه"]},{"id":"c10","cat":"المستقبل معاً","q":"الصورة التي ترسمها لمستقبلك مع {{شريك}} هي","opts":["نجاح كبير وبناء أسرة قوية","حياة بسيطة وهادئة مليئة بالحب","مغامرات وسفر لا ينتهي","بيت دافئ وعائلة سعيدة"]},{"id":"c11","cat":"الصفات المحببة","q":"عندما يبتسم لك {{الإنسان}} من قلبه، أول شيء تشعر به هو","opts":["فخر إنه من نصيبي","أمان وثقة بالمستقبل","حب يتدفق في عروقي","سعادة تغمر كل كياني"]},{"id":"c12","cat":"الاحترام والثقة","q":"أكثر ما يقدره {{شريك}} فيك هو","opts":["خصوصيتي واستقلاليتي","رأيي وطريقة تفكيري","عقلي ونجاحي في عملي","حناني وعاطفتي"]},{"id":"c13","cat":"العلاقة الحميمة","q":"أهم شيء في العلاقة الحميمة بينك وبين {{زوج}} هو","opts":["الراحة والثقة المتبادلة","التواصل العاطفي والكلمات","الاهتمام بإسعاد الطرف الآخر","الشغف والعاطفة الجياشة"]},{"id":"c14","cat":"الاحترام والثقة","q":"الشيء الذي يزيد ثقتك بـ{{حبيب}} هو","opts":["صدقه في كل شيء يخبرك به","احترامه لقراراتك ورأيك","دعمه لك في أوقات ضعفك","حفظه لأسرارك وخفاياك"]},{"id":"c15","cat":"الرومانسية والحب","q":"أجمل ليلة قضاءها مع {{زوج}} تكون عندما","opts":["تتحدثان حتى الفجر عن كل شيء","تمشيان في هدوء الليل معاً","تجلسان في صمت مريح ومطمئن","تسهران معاً يشاهدان شيئاً تحبانه"]},{"id":"c16","cat":"المفاجآت والهدايا","q":"أفضل هدية يمكن أن تفاجئ بها من {{الإنسان}} هي","opts":["إكسسوار بسيط يحمله كل يوم","مفاجأة سفر لمكان تحلم به","شيء صنعها بيديه خصيصاً لك","رسالة طويلة مكتوبة بخط يده"]},{"id":"c17","cat":"الصفات المحببة","q":"أكثر صفة في {{حبيب}} تجذبك هي","opts":["لطفه وطريقة تعامله","قوته وحسمه في القرارات","روح الدعابة والمرح","ذكاؤه وعمق تفكيره"]},{"id":"c18","cat":"الجمال والأناقة","q":"الجزء الذي جذبك أولاً في {{زوج}} كان","opts":["عيونه ونظراته","ابتسامته وطريقة ضحكه","صوته وطريقة كلامه","شكله العام وأناقته"]},{"id":"c19","cat":"المشاعر والعواطف","q":"عندما تحتاج الدعم العاطفي، تتوقع من {{شريك}} أن","opts":["يستمع إليك بصبر دون مقاطعة","يحتضنك ويشعرك بالأمان","يقدم حلولاً عملية لمشكلتك","يجلس بجانبك بصمت حتى تهدأ"]},{"id":"c20","cat":"المستقبل معاً","q":"إذا كان عليك اختيار مكان واحد تعيش فيه مع {{الإنسان}}، ستختار","opts":["مدينة حديثة مليانة حياة","بلدة هادئة قريبة من الطبيعة","مكان قريب من الأهل والعائلة","أي مكان ما دام معي"]},{"id":"c21","cat":"الاحترام والثقة","q":"أكثر موقف يزيد حبك لـ{{حبيب}} هو عندما","opts":["يدافع عنك أمام الآخرين","يتنازل عن رأيه ,"cat":"الأناقة واللباس","q":"مدى اهتمامك بالعطور والرائحة الشخصية للشريك:","opts":["شرط أساسي لا أتنازل عنه","يهمني النظافة العامة أولاً","أحب رائحة معينة أتناسب معها","غير مهم"]},{"id":"t9","cat":"الأناقة واللباس","q":"كيف تفضل أن يهتم شريكك بمظهره أمام الناس؟","opts":["يهتم بأدق التفاصيل دائماً","طبيعي وتلقائي دون تكلف","يوازن بين الأناقة والبساطة","المهم يرتاح هو أولاً"]},{"id":"t10","cat":"الصحة واللياقة","q":"مدى اهتمامك بأن يمارس شريكك الرياضة؟","opts":["أفضل أن يذهب للجيم بانتظام","يكفي أن يحافظ على صحته","أتمنى نتشارك في نشاط بدني معاً","غير مهم"]},{"id":"t11","cat":"الصحة واللياقة","q":"الفارق في العمر المقبول بالنسبة لك:","opts":["أفضل من يبدو أكبر مني سناً","أفضل من يبدو في مثل عمري","لا يهم العمر المهم النضج","أفضله أصغر مني قليلاً"]},{"id":"t12","cat":"الصحة واللياقة","q":"الابتسامة وصحة الأسنان عند الشريك:","opts":["يجب أن تكون مثالية ومرتبة","طبيعية حتى لو غير منتظمة","المهم ابتسامة دافئة تريح النفس","غير مهم"]},{"id":"t13","cat":"الصوت واللغة","q":"نبرة الصوت التي تفضلها في شريكك:","opts":["هادئة وناعمة","قوية وجهورية","متزنة ومريحة للأذن","الصوت غير مهم"]},{"id":"t14","cat":"الصوت واللغة","q":"لغة الجسد وطريقة المشي التي تعجبك:","opts":["حركات سريعة وحيوية","حركات رصينة وهادئة","لغة جسد ثقة ووقار","لا ألاحظ هذه التفاصيل"]},{"id":"t15","cat":"المزاج والطباع","q":"كيف تفضل طبيعة مزاج شريك حياتك؟","opts":["هادئ/ة جداً وصامت/ة","حيوي/ة ومرح/ة باستمرار","متوازن/ة حسب الموقف","يتنوع بين الحين والآخر"]},{"id":"t16","cat":"المزاج والطباع","q":"عند حدوث خلاف، كيف تفضل أن يتصرف شريكك؟","opts":["ينسحب حتى يهدأ ثم يناقش بهدوء","يعبر عن رأيه فوراً وينهي الموضوع","يمتص غضبي بحكمة وهدوء","يتشاور معي لنحل الأمر معاً"]},{"id":"t17","cat":"المزاج والطباع","q":"حس الدعابة والمرح لدى الشريك:","opts":["مرح جداً ويضحك باستمرار","جاد ويراقب الموقف","يفهم نكاتي ويشاركني الضحك","خفيف الظل في الوقت المناسب"]},{"id":"t18","cat":"المزاج والطباع","q":"عند الحزن أو الضغوط، تتوقع من شريكك أن:","opts":["يعطيني مساحة أتعامل بمفردي","يكون بجانبي ويستمع لي","يوازن بين الدعم والمساحة function getTopic() {
  var names = [state.myUsername, state.partnerUsername].sort();
  return 'hubban-' + names[0] + '-' + names[1];
}

function adaptQuestion(q) {
  var maleMap = {'{{\u0632\u0648\u062C}}': '\u0632\u0648\u062C\u062A\u0643', '{{\u062D\u0628\u064A\u0628}}': '\u062D\u0628\u064A\u0628\u062A\u0643', '{{\u0634\u0631\u064A\u0643}}': '\u0634\u0631\u064A\u0643\u0629 \u062D\u064A\u0627\u062A\u0643', '{{\u0627\u0644\u0625\u0646\u0633\u0627\u0646}}': '\u0627\u0644\u0625\u0646\u0633\u0627\u0646\u0629 \u0627\u0644\u062A\u064A \u062A\u062D\u0628\u0647\u0627'};
  var femaleMap = {'{{\u0632\u0648\u062C}}': '\u0632\u0648\u062C\u0643', '{{\u062D\u0628\u064A\u0628}}': '\u062D\u0628\u064A\u0628\u0643', '{{\u0634\u0631\u064A\u0643}}': '\u0634\u0631\u064A\u0643 \u062D\u064A\u0627\u062A\u0643', '{{\u0627\u0644\u0625\u0646\u0633\u0627\u0646}}': '\u0627\u0644\u0625\u0646\u0633\u0627\u0646 \u0627\u0644\u0630\u064A \u062A\u062D\u0628\u0647'};
  var qText;
  if (q.qm && q.qf) {
    qText = state.myGender === 'male' ? q.qm : q.qf;
  } else {
    qText = q.q;
    var map = state.myGender === 'male' ? maleMap : femaleMap;
    for (var key in map) {
      qText = qText.split(key).join(map[key]);
    }
  }
  return { id: q.id, cat: q.cat, q: qText, opts: q.opts.slice() };
}

  if (state.sseConnection) { try { state.sseConnection.close(); } catch(e) {} }
  var topic = getTopic();
  var encodedTopic = encodeURIComponent(topic);
  var es = new EventSource('https://ntfy.sh/' + encodedTopic + '/sse');
  state.sseConnection = es;
  es.onopen = function() {
    state.connected = true;
 updateConnStatus();
    sendMsg({ type: 'hello', from: state.myUsername, displayName: state.myDisplayName, gender: state.myGender });
  };
  es.onmessage = function(event) {
    try {
      var ntfyRaw = JSON.parse(event.data);
      var data = JSON.parse(ntfyRaw.message);
      if (data.from === state.myUsername) return;
      handleMessage(data);
    } catch(e) {}
  };
  es.onerror = function() {
    state.connected = false;
    updateConnStatus();
    try { es.close(); } catch(e) {}
    setTimeout(function() { if (state.myUsername) connectSSE(); }, 3000);
  };
}

function sendMsg(obj) {
  obj.from = state.myUsername;
  obj.ts = Date.now();
  var topic = getTopic();
  fetch('https://ntfy.sh/' + encodeURIComponent(topic), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(obj)
  }).catch(function(){});
}

function handleMessage(data) {
  if (data.type === 'hello') {
    state.partnerOnline = true;
    state.partnerDisplayName = data.displayName || '';
    state.partnerGender = data.gender || '';
    updatePartnerStatus();
  } else if (data.type === 'game-invite') {
    if (state.gamePhase === 'lobby') {
      showInvitePopup(data.displayName);
    }
  } else if (data.type === 'game-accept') {
    if (state.gamePhase === 'waiting-accept') {
      state.gamePhase = 'answering';
      sendNextQuestion();
    }
  } else if (data.type === 'game-decline') {
    if (state.gamePhase === 'waiting-accept') {
      state.gamePhase = 'lobby';
      showToast('\u062A\u0645 \u0631\u0641\u0636 \u0627\u0644\u062F\u0639\u0648\u0629');
      renderLobby();
    }
  } else if (data.type === 'game-question') {
    /* Cancel any pending retry */
    if (state.questionRetryTimer) { clearTimeout(state.questionRetryTimer); state.questionRetryTimer = null; }
    state.waitingForAck = false;
    state.iAmQuestionSender = false;
    var aq = adaptQuestion(data.question);
    state.currentQ = aq;
    state.currentQRaw = data.question;
    state.questionNum = data.questionNum || 1;
    state.myAnswer = -1;
    state.partnerAnswer = -1;
    state.iSubmitted = false;
    state.partnerSubmitted = false;
    state.chatMsgs = [];
    state.gamePhase = 'answering';
    renderGame();
    /* Send ack so the sender knows we got it */
    sendMsg({ type: 'game-question-ack', questionId: data.question ? data.question.id : '' });
  } else if (data.type === 'game-question-ack') {
    /* Partner received the question, stop retrying */
    if (state.waitingForAck) {
      state.waitingForAck = false;
      if (state.questionRetryTimer) { clearTimeout(state.questionRetryTimer); state.questionRetryTimer = null; }
    }
  } else if (data.type === 'game-answer') {
    if (state.gamePhase === 'answering' || state.gamePhase === 'waiting-partner') {
      state.partnerAnswer = data.answer;
      state.partnerSubmitted = true;
      if (state.iSubmitted && state.gamePhase === 'waiting-partner') {
        showReveal();
      } else if (state.gamePhase === 'answering') {
        /* Don't re-render entire game! Just update the waiting status */
        updateWaitingStatus();
      }
    }
  } else if (data.type === 'game-chat') {
    var chatMsg = { name: data.displayName, content: data.content, ts: data.ts, isMe: false };
    state.chatMsgs.push(chatMsg);
    appendChatMsg(chatMsg);
  } else if (data.type === 'game-end') {
    if (state.questionRetryTimer) { clearTimeout(state.questionRetryTimer); state.questionRetryTimer = null; }
    state.gamePhase = 'summary';
    renderSummary();
  } else if (data.type === 'game-leave') {
    if (state.questionRetryTimer) { clearTimeout(state.questionRetryTimer); state.questionRetryTimer = null; }
    state.gamePhase = 'lobby';
    state.currentQ = null;
    showToast(state.partnerDisplayName + ' \u063A\u0627\u062F\u0631 \u0627\u0644\u0644\u0639\u0628\u0629');
    renderLobby();
  }
}

/* ─── Game ─── */
function sendNextQuestion() {
  var available = ALL_QUESTIONS.filter(function(q) { return state.askedIds.indexOf(q.id) === -1; });
  if (available.length === 0) {
    sendMsg({ type: 'game-end' });
    state.gamePhase = 'summary';
    renderSummary();
    return;
  }
  var idx = Math.floor(Math.random() * available.length);
  var q = available[idx];
  state.askedIds.push(q.id);
  state.questionNum++;
  var aq = adaptQuestion(q);
  state.currentQ = aq;
  state.currentQRaw = q;
  state.myAnswer = -1;
  state.partnerAnswer = -1;
  state.iSubmitted = false;
  state.partnerSubmitted = false;
  state.chatMsgs = [];
  state.iAmQuestionSender = true;
  state.waitingForAck = true;

  /* Send question with retry mechanism */
  function sendQuestionMsg() {
    sendMsg({ type: 'game-question', question: q, questionNum: state.questionNum });
  }
  sendQuestionMsg();

  /* If no ack received within 4 seconds, retry up to 3 times */
  var retryCount = 0;
  function retryLoop() {
    if (!state.waitingForAck || retryCount >= 3) {
      state.waitingForAck = false;
      return;
    }
    retryCount++;
    sendQuestionMsg();
    state.questionRetryTimer = setTimeout(retryLoop, 4000);
  }
  state.questionRetryTimer = setTimeout(retryLoop, 4000);

  state.gamePhase = 'answering';
  renderGame();
}

function renderGame() {
  clearApp();
  var app = document.getElementById('app');
  if (state.gamePhase === 'answering' || state.gamePhase === 'waiting-partner') {
    renderAnswering(app);
  } else if (state.gamePhase === 'reveal') {
    renderRevealScreen(app);
  }
}

function buildGameHeader() {
  return h('div', { class: 'game-header' }, [
    h('span', { class: 'q-num' }, '\u0627\u0644\u0633\u0624\u0627\u0644 ' + state.questionNum),
    h('span', { class: 'q-cat' }, state.currentQ ? state.currentQ.cat : ''),
    h('button', { class: 'leave-btn', onClick: function() { leaveGame(); } }, '\u0645\u063A\u0627\u062F\u0631\u0629 \u270B')
  ]);
}

function renderAnswering(app) {
  var q = state.currentQ;
  if (!q) return;
  var header = buildGameHeader();
  var qText = h('div', { class: 'question-text' }, q.q);
  var letters = ['\u0623','\u0628','\u062C','\u062F'];
  var optBtns = [];
  for (var i = 0; i < q.opts.length; i++) {
    var isSelected = (state.myAnswer === i);
    var isDisabled = state.iSubmitted;
    optBtns.push(h('button', {
      class: 'option-btn' + (isSelected ? ' selected' : ''),
      disabled: isDisabled,
      'data-idx': String(i),
      onClick: (function(idx) { return function() { selectAnswer(idx); }; })(i)
    }, [
      h('span', { class: 'opt-letter' }, letters[i]),
      h('span', {}, q.opts[i])
    ]));
  }
  var optsDiv = h('div', { class: 'options-grid', id: 'optionsGrid' }, optBtns);
  var confirmBtn = h('button', {
    class: 'btn btn-primary',
    id: 'confirmBtn',
    style: 'width:100%;margin-top:12px',
    disabled: state.myAnswer === -1 || state.iSubmitted,
    onClick: function() { submitAnswer(); }
  }, state.iSubmitted ? '\u062A\u0645 \u0627\u0644\u062A\u0633\u0644\u064A\u0645 \u2705' : '\u062A\u0623\u0643\u064A\u062F \u0627\u0644\u0625\u062C\u0627\u0628\u0629');
  var bodyContent = [qText, optsDiv, confirmBtn];
  if (state.iSubmitted) {
    bodyContent.push(buildWaitingStatus());
  }
  var body = h('div', { class: 'game-body' }, bodyContent);
  var footer = h('div', { class: 'game-footer' });
  var screen = h('div', { class: 'screen', id: 'gameScreen', style: 'justify-content:flex-start;padding:0' }, [header, body, footer]);
  app.appendChild(screen);
}

function updateWaitingStatus() {
  /* Only update the waiting status area, don't re-render the whole game */
  var existing = document.querySelector('.waiting-card');
  if (existing) existing.remove();
  var confirmBtn = document.getElementById('confirmBtn');
  if (!confirmBtn) return;
  if (state.iSubmitted) {
    confirmBtn.parentNode.insertBefore(buildWaitingStatus(), confirmBtn.nextSibling);
    confirmBtn.textContent = '\u062A\u0645 \u0627\u0644\u062A\u0633\u0644\u064A\u0645 \u2705';
    confirmBtn.disabled = true;
  }
}

function buildWaitingStatus() {
  var myIcon = state.iSubmitted ? '\u2705' : '\u23F3';
  var partnerIcon = state.partnerSubmitted ? '\u2705' : '\u23F3';
  return h('div', { class: 'waiting-card', style: 'padding:20px 0' }, [
    h('p', { style: 'font-size:16px;color:var(--text)' }, '\u062A\u0645 \u062A\u0633\u0644\u064A\u0645 \u0625\u062C\u0627\u0628\u062A\u0643'),
    h('div', { class: 'waiting-status' }, [
      h('div', { class: 'ws-item' }, [h('div', { class: 'ws-icon' }, myIcon), h('div', { class: 'ws-label' }, state.myDisplayName)]),
      h('div', { class: 'ws-item' }, [h('div', { class: 'ws-icon' }, partnerIcon), h('div', { class: 'ws-label' }, state.partnerDisplayName)])
    ])
  ]);
}

/* FIX: selectAnswer now updates DOM directly instead of re-rendering */
function selectAnswer(idx) {
  if (state.iSubmitted) return;
  state.myAnswer = idx;
  /* Update button styles directly without re-rendering */
  var btns = document.querySelectorAll('.option-btn');
  for (var i = 0; i < btns.length; i++) {
    var bIdx = parseInt(btns[i].getAttribute('data-idx'));
    if (bIdx === idx) {
      btns[i].classList.add('selected');
    } else {
      btns[i].classList.remove('selected');
    }
  }
  /* Enable confirm button */
  var confirmBtn = document.getElementById('confirmBtn');
  if (confirmBtn) confirmBtn.disabled = false;
}

function submitAnswer() {
  if (state.myAnswer === -1 || state.iSubmitted) return;
  state.iSubmitted = true;
  sendMsg({ type: 'game-answer', answer: state.myAnswer });
  if (state.partnerSubmitted) {
    showReveal();
  } else {
    state.gamePhase = 'waiting-partner';
    /* Don't re-render! Just update the confirm button and show waiting status */
    var confirmBtn = document.getElementById('confirmBtn');
    if (confirmBtn) {
      confirmBtn.textContent = '\u062A\u0645 \u0627\u0644\u062A\u0633\u0644\u064A\u0645 \u2705';
      confirmBtn.disabled = true;
    }
    updateWaitingStatus();
  }
}

function leaveGame() {
  if (state.questionRetryTimer) { clearTimeout(state.questionRetryTimer); state.questionRetryTimer = null; }
  state.waitingForAck = false;
  state.iAmQuestionSender = false;
  state.gamePhase = 'lobby';
  state.currentQ = null;
  state.currentQRaw = null;
  sendMsg({ type: 'game-leave' });
  renderLobby();
}

/* ─── Reveal ─── */
function showReveal() {
  state.gamePhase = 'reveal';
  if (state.myAnswer === state.partnerAnswer) {
    state.score.match++;
  }
  state.score.total++;
  renderRevealScreen(document.getElementById('app'));
}

function renderRevealScreen(app) {
  clearApp();
  var q = state.currentQ;
  if (!q) return;
  var isMatch = state.myAnswer === state.partnerAnswer;
  var matchClass = isMatch ? 'matched' : 'differed';
  var matchText = isMatch ? '\u2705 \u062A\u0648\u0627\u0641\u0642!' : '\u274C \u0627\u062E\u062A\u0644\u0627\u0641 \u0641\u064A \u0627\u0644\u0631\u0623\u064A';
  var pct = Math.round(((state.score.match / state.score.total) * 100));
  var header = buildGameHeader();
  var qText = h('div', { class: 'question-text', style: 'font-size:16px;margin-bottom:12px' }, q.q);
  var matchInd = h('div', { class: 'match-indicator ' + matchClass }, [matchText, h('span', { style: 'font-size:13px;opacity:.8;margin-right:8px' }, pct + '%')]);
  var myAnsText = (state.myAnswer >= 0 && state.myAnswer < q.opts.length) ? q.opts[state.myAnswer] : '\u2014';
  var partnerAnsText = (state.partnerAnswer >= 0 && state.partnerAnswer < q.opts.length) ? q.opts[state.partnerAnswer] : '\u2014';
  var revealRows = h('div', { class: 'reveal-row' }, [
    h('div', { class: 'reveal-col me-col' }, [h('div', { class: 'who' }, state.myDisplayName), h('div', { class: 'ans' }, myAnsText)]),
    h('div', { class: 'reveal-col partner-col' }, [h('div', { class: 'who' }, state.partnerDisplayName), h('div', { class: 'ans' }, partnerAnsText)])
  ]);
  var revealCard = h('div', { class: 'reveal-card' }, [revealRows]);
  /* Chat section */
  var chatTitle = h('h4', {}, '\uD83D\uDCAC \u0645\u062D\u0627\u062F\u062B\u0629 \u062D\u0648\u0644 \u0627\u0644\u0625\u062C\u0627\u0628\u0629');
  var chatMsgsDiv = h('div', { id: 'gameChatMsgs' });
  for (var ci = 0; ci < state.chatMsgs.length; ci++) {
    chatMsgsDiv.appendChild(buildChatBubble(state.chatMsgs[ci]));
  }
  var chatInput = h('input', { type: 'text', id: 'chatInput', placeholder: '\u0627\u0643\u062A\u0628 \u0631\u0633\u0627\u0644\u0629...', style: 'flex:1;padding:10px 14px;border-radius:20px;border:1px solid var(--border);background:#1a1a1a;color:var(--text);font-size:14px;outline:none;font-family:inherit' });
  var emojiBtn = h('button', { id: 'emojiBtn', style: 'width:38px;height:38px;border-radius:50%;border:none;background:var(--rose);color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center', onClick: function() { toggleEmojiPicker(); } }, '\uD83D\uDE0A');
  /* FIX: Added send button */
  var sendBtn = h('button', { id: 'chatSendBtn', class: 'chat-send-btn', onClick: function() { sendChatMsg(); } }, '\u27A4');
  var inputBar = h('div', { class: 'chat-input-bar' }, [chatInput, emojiBtn, sendBtn]);
  var emojiPicker = buildEmojiPicker();
  var chatSection = h('div', { class: 'chat-section', style: 'position:relative' }, [chatTitle, chatMsgsDiv, emojiPicker, inputBar]);
  var nextBtn = h('button', {
    class: 'btn btn-primary',
    style: 'width:100%;padding:14px;font-size:16px',
    onClick: function() { sendNextQuestion(); }
  }, '\u0627\u0644\u0633\u0624\u0627\u0644 \u0627\u0644\u062A\u0627\u0644\u064A \u2192');
  var footer = h('div', { class: 'game-footer' }, [nextBtn]);
  var body = h('div', { class: 'game-body' }, [qText, matchInd, revealCard, chatSection]);
  var screen = h('div', { class: 'screen', id: 'gameScreen', style: 'justify-content:flex-start;padding:0' }, [header, body, footer]);
  app.appendChild(screen);
  /* Wire up chat input */
  chatInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChatMsg(); }
  });
  chatInput.addEventListener('focus', function() { state.chatInputFocused = true; });
  chatInput.addEventListener('blur', function() { state.chatInputFocused = false; });
  chatMsgsDiv.scrollTop = chatMsgsDiv.scrollHeight;
}

function buildChatBubble(msg) {
  var cls = msg.isMe ? 'chat-bubble me' : 'chat-bubble them';
  var nameDiv = h('div', { class: 'chat-name' }, msg.name);
  var contentDiv = h('span', {}, msg.content);
  var timeStr = formatTime(msg.ts);
  var timeDiv = h('div', { class: 'chat-time' }, timeStr);
  return h('div', { class: cls }, [nameDiv, contentDiv, timeDiv]);
}

function appendChatMsg(msg) {
  var container = document.getElementById('gameChatMsgs');
  if (!container) return;
  container.appendChild(buildChatBubble(msg));
  container.scrollTop = container.scrollHeight;
}

function sendChatMsg() {
  var input = document.getElementById('chatInput');
  if (!input) return;
  var text = input.value.trim();
  if (!text) return;
  input.value = '';
  var msg = { name: state.myDisplayName, content: text, ts: Date.now(), isMe: true };
  state.chatMsgs.push(msg);
  appendChatMsg(msg);
  sendMsg({ type: 'game-chat', displayName: state.myDisplayName, content: text });
  input.focus();
}

function formatTime(ts) {
  var d = new Date(ts);
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

/* ─── Emoji Picker ─── */
function buildEmojiPicker() {
  var cats = [

  for (var i = 0; i < cats.length; i++) {
    var cat = cats[i];
    var spans = [];
    for (var j = 0; j < cat.emojis.length; j++) {
      (function(emoji) {
        spans.push(h('span', { onClick: function(e) { e.stopPropagation(); insertEmoji(emoji); } }, emoji));
      })(cat.emojis[j]);
    }
    catDivs.push(h('div', { class: 'emoji-cat' }, [
      h('div', { class: 'emoji-cat-title' }, cat.name),
      h('div', { class: 'emoji-grid' }, spans)
    ]));
  }
  return h('div', { class: 'emoji-picker', id: 'emojiPicker' }, catDivs);
}

function toggleEmojiPicker() {
  var ep = document.getElementById('emojiPicker');
  if (!ep) return;
  ep.classList.toggle('open');
}

function insertEmoji(emoji) {
  var input = document.getElementById('chatInput');
  if (!input) return;
  var start = input.selectionStart;
  var end = input.selectionEnd;
  var val = input.value;
  input.value = val.substring(0, start) + emoji + val.substring(end);
  input.selectionStart = input.selectionEnd = start + emoji.length;
  input.focus();
}

/* Close emoji picker on outside click */
document.addEventListener('click', function(e) {
  var ep = document.getElementById('emojiPicker');
  var eb = document.getElementById('emojiBtn');
  if (ep && ep.classList.contains('open') && !ep.contains(e.target) && (!eb || !eb.contains(e.target))) {
    ep.classList.remove('open');
  }
});

/* ─── Summary ─── */
function renderSummary() {
  clearApp();
  var app = document.getElementById('app');
  var total = state.score.total;
  var matched = state.score.match;
  var differed = total - matched;
  var pct = total > 0 ? Math.round((matched / total) * 100) : 0;
  var msg = '';
  if (pct === 100) msg = '\u062A\u0648\u0627\u0641\u0642 \u0645\u0630\u0647\u0644! \u0642\u0644\u0628\u0627\u0643\u0645\u0627 \u064A\u0646\u0628\u0636\u0627\u0646 \u0628\u0625\u064A\u0642\u0627\u0639 \u0648\u0627\u062D\u062F \u2764\uFE0F';
  else if (pct >= 80) msg = '\u062A\u0648\u0627\u0641\u0642 \u0631\u0627\u0626\u0639! \u0623\u0646\u062A\u0645\u0627 \u0634\u0631\u064A\u0643\u0627\u0646 \u0645\u062A\u0641\u0627\u0647\u0645\u0627\u0646 \u062C\u062F\u0627\u064B';
  else if (pct >= 60) msg = '\u062A\u0648\u0627\u0641\u0642 \u062C\u0645\u064A\u0644! \u062D\u0627\u0641\u0638\u0627 \u0639\u0644\u0649 \u0647\u0630\u0627 \u0627\u0644\u062D\u0628';
  else if (pct >= 40) msg = '\u062A\u0648\u0627\u0641\u0642 \u062C\u064A\u062F! \u0627\u0644\u0627\u062E\u062A\u0644\u0627\u0641 \u064A\u0632\u064A\u062F \u0627\u0644\u062D\u0628 \u0639\u0645\u0642\u0627\u064B';
  else msg = '\u0627\u0644\u0627\u062E\u062A\u0644\u0627\u0641\u0627\u062A \u062C\u0632\u0621 \u0645\u0646 \u0627\u0644\u062D\u0628! \uD83D\uDE0A';
  var header = h('div', { class: 'game-header' }, [h('span', { style: 'font-size:16px;font-weight:bold' }, '\u0627\u0644\u0646\u062A\u064A\u062C\u0629 \u0627\u0644\u0646\u0647\u0627\u0626\u064A\u0629')]);
  var pctDiv = h('div', { class: 'summary-pct' }, pct + '%');
  var label = h('div', { class: 'summary-label' }, matched + ' \u0645\u0646 ' + total + ' \u0625\u062C\u0627\u0628\u0627\u062A \u0645\u062A\u0637\u0627\u0628\u0642\u0629');
  var msgDiv = h('div', { class: 'summary-msg' }, msg);
  var statBoxes = h('div', { class: 'stat-boxes' }, [
    h('div', { class: 'stat-box green' }, [h('div', { class: 'stat-val' }, matched), h('div', { class: 'stat-lbl' }, '\u062A\u0648\u0627\u0641\u0642')]),
    h('div', { class: 'stat-box red' }, [h('div', { class: 'stat-val' }, differed), h('div', { class: 'stat-lbl' }, '\u0627\u062E\u062A\u0644\u0627\u0641')]),
    h('div', { class: 'stat-box blue' }, [h('div', { class: 'stat-val' }, total), h('div', { class: 'stat-lbl' }, '\u0625\u062C\u0645\u0627\u0644\u064A')])
  ]);
  var newGameBtn = h('button', {
    class: 'btn btn-primary',
    style: 'width:100%;padding:14px;font-size:16px;margin-top:20px',
    onClick: function() {
      state.askedIds = [];
      state.questionNum = 0;
      state.score = { match: 0, total: 0 };
      state.chatMsgs = [];
      state.currentQ = null;
      state.currentQRaw = null;
      state.myAnswer = -1;
      state.partnerAnswer = -1;
      state.iSubmitted = false;
      state.partnerSubmitted = false;
      state.iAmQuestionSender = false;
      state.waitingForAck = false;
      state.gamePhase = 'lobby';
      renderLobby();
    }
  }, '\u0644\u0639\u0628\u0629 \u062C\u062F\u064A\u062F\u0629 \uD83D\uDD04');
  var summaryCard = h('div', { class: 'summary-card' }, [pctDiv, label, msgDiv, statBoxes, newGameBtn]);
  var body = h('div', { class: 'game-body', style: 'display:flex;align-items:center;justify-content:center' }, [summaryCard]);
  var footer = h('div', { class: 'game-footer' });
  var screen = h('div', { class: 'screen', id: 'gameScreen', style: 'justify-content:flex-start;padding:0' }, [header, body, footer]);
  app.appendChild(screen);
}
