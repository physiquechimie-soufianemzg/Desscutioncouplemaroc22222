<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>حبّان · لعبة التوافق</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--card:#141414;--border:#262626;--rose:#e11d48;--rose-light:#fb7185;--rose-dark:#9f1239;--text:#f5f5f5;--text2:#a3a3a3;--green:#22c55e;--red:#ef4444;--blue:#3b82f6}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Segoe UI',Tahoma,Arial,sans-serif;direction:rtl}
#app{width:100%;height:100dvh;overflow:hidden;position:relative}
#toasts{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:#1e1e1e;color:var(--text);padding:10px 20px;border-radius:10px;font-size:14px;opacity:0;transform:translateY(-10px);transition:all .3s;pointer-events:auto;border:1px solid var(--border)}
.toast.show{opacity:1;transform:translateY(0)}
.screen{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;position:absolute;top:0;left:0}
/* Login */
#loginScreen{background:radial-gradient(ellipse at center,#1a0a10 0%,var(--bg) 70%)}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px 24px;width:100%;max-width:360px;text-align:center}
.login-card h1{font-size:28px;margin-bottom:8px;background:linear-gradient(135deg,var(--rose-light),var(--rose));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-card p{color:var(--text2);font-size:14px;margin-bottom:24px}
.login-card input{width:100%;padding:12px 16px;border-radius:10px;border:1px solid var(--border);background:#1a1a1a;color:var(--text);font-size:16px;text-align:center;outline:none;margin-bottom:16px;direction:ltr}
.login-card input:focus{border-color:var(--rose)}
.btn{padding:12px 32px;border-radius:12px;border:none;font-size:16px;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-primary{background:linear-gradient(135deg,var(--rose),var(--rose-dark));color:#fff}
.btn-primary:hover{transform:scale(1.03);box-shadow:0 4px 20px rgba(225,29,72,.4)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--rose);color:var(--rose-light)}
/* Welcome */
#welcomeScreen{background:radial-gradient(ellipse at top,#2d0a1e 0%,#1a0515 40%,var(--bg) 100%)}
.welcome-text{font-size:22px;text-align:center;line-height:1.8;max-width:400px;animation:fadeInUp .8s ease}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
/* Flowers */
#flowersScreen{background:radial-gradient(ellipse at 30% 20%,#2d0a1e 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,#1a0525 0%,transparent 50%),var(--bg);overflow:hidden;position:relative}
.flower-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;padding:20px;max-width:340px;margin:20px auto}
.flower-item{font-size:48px;text-align:center;animation:popIn .5s ease both;cursor:default}
.flower-item:nth-child(1){animation-delay:.1s}.flower-item:nth-child(2){animation-delay:.2s}.flower-item:nth-child(3){animation-delay:.3s}
.flower-item:nth-child(4){animation-delay:.4s}.flower-item:nth-child(5){animation-delay:.5s}.flower-item:nth-child(6){animation-delay:.6s}
.flower-item:nth-child(7){animation-delay:.7s}.flower-item:nth-child(8){animation-delay:.8s}.flower-item:nth-child(9){animation-delay:.9s}
@keyframes popIn{from{opacity:0;transform:scale(0) rotate(-20deg)}to{opacity:1;transform:scale(1) rotate(0)}}
.floating-petal{position:absolute;font-size:20px;animation:fall linear infinite;pointer-events:none;opacity:.7}
@keyframes fall{0%{transform:translateY(-40px) rotate(0deg) translateX(0);opacity:.8}50%{transform:translateY(50vh) rotate(180deg) translateX(30px);opacity:.6}100%{transform:translateY(100vh) rotate(360deg) translateX(-20px);opacity:0}}
/* Lobby */
#lobbyScreen{background:radial-gradient(ellipse at bottom,#0f1a2e 0%,var(--bg) 70%)}
.lobby-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px 24px;width:100%;max-width:360px;text-align:center}
.lobby-card h2{font-size:24px;margin-bottom:6px}
.lobby-card .partner-name{color:var(--rose-light);font-size:20px;margin-bottom:16px}
.status-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-left:6px;vertical-align:middle}
.status-dot.online{background:var(--green);box-shadow:0 0 8px var(--green)}
.status-dot.offline{background:var(--text2)}
.conn-status{font-size:12px;color:var(--text2);margin-top:12px}
/* Game */
#gameScreen{background:var(--bg);display:flex;flex-direction:column;height:100%}
.game-header{background:var(--card);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.game-header .q-num{font-size:14px;color:var(--text2)}
.game-header .q-cat{font-size:12px;color:var(--rose-light);background:rgba(225,29,72,.15);padding:2px 10px;border-radius:20px}
.game-body{flex:1;overflow-y:auto;padding:20px 16px;-webkit-overflow-scrolling:touch}
.game-footer{background:var(--card);border-top:1px solid var(--border);padding:12px 16px;flex-shrink:0}
.question-text{font-size:18px;line-height:1.8;margin-bottom:20px;text-align:center}
.options-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.option-btn{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:14px 16px;font-size:15px;color:var(--text);cursor:pointer;transition:all .2s;text-align:right;font-family:inherit;display:flex;align-items:center;gap:10px}
.option-btn:hover{border-color:var(--rose);background:#1a1020}
.option-btn.selected{border-color:var(--rose);background:rgba(225,29,72,.12)}
.option-btn .opt-letter{width:30px;height:30px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;font-weight:bold}
.option-btn.selected .opt-letter{background:var(--rose);color:#fff}
.waiting-card{text-align:center;padding:40px 20px}
.waiting-card .check-anim{font-size:48px;margin-bottom:16px;animation:fadeInUp .5s ease}
.waiting-card p{color:var(--text2);font-size:15px;margin-bottom:8px}
.waiting-status{display:flex;justify-content:center;gap:24px;margin-top:20px}
.waiting-status .ws-item{text-align:center}
.waiting-status .ws-icon{font-size:24px;margin-bottom:4px}
.waiting-status .ws-label{font-size:12px;color:var(--text2)}
/* Reveal */
.reveal-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px}
.reveal-row{display:flex;gap:12px;margin-bottom:12px}
.reveal-col{flex:1;padding:12px;border-radius:12px;text-align:center}
.reveal-col.me-col{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.3)}
.reveal-col.partner-col{background:rgba(225,29,72,.1);border:1px solid rgba(225,29,72,.3)}
.reveal-col .who{font-size:12px;color:var(--text2);margin-bottom:6px}
.reveal-col .ans{font-size:14px;line-height:1.6}
.match-indicator{text-align:center;padding:12px;border-radius:12px;font-size:16px;font-weight:bold;margin-bottom:16px}
.match-indicator.matched{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.3)}
.match-indicator.differed{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.3)}
/* Chat */
.chat-section{margin-top:16px}
.chat-section h4{font-size:13px;color:var(--text2);margin-bottom:8px}
#gameChatMsgs{max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;margin-bottom:10px;padding:4px 0}
.chat-bubble{max-width:80%;padding:8px 14px;border-radius:16px;font-size:14px;line-height:1.5;word-wrap:break-word}
.chat-bubble.me{background:var(--rose);color:#fff;align-self:flex-end;border-bottom-left:8px}
.chat-bubble.them{background:#1e1e1e;color:var(--text);align-self:flex-start;border-bottom-right:8px}
.chat-bubble .chat-name{font-size:11px;opacity:.7;margin-bottom:2px}
.chat-bubble .chat-time{font-size:10px;opacity:.6;text-align:left;margin-top:2px}
.chat-input-bar{display:flex;gap:8px;align-items:center}
.chat-input-bar input{flex:1;padding:10px 14px;border-radius:20px;border:1px solid var(--border);background:#1a1a1a;color:var(--text);font-size:14px;outline:none;font-family:inherit}
.chat-input-bar input:focus{border-color:var(--rose)}
.chat-input-bar button{width:38px;height:38px;border-radius:50%;border:none;background:var(--rose);color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
/* Emoji picker */
.emoji-picker{position:absolute;bottom:60px;left:16px;right:16px;background:#1a1a1a;border:1px solid var(--border);border-radius:16px;padding:12px;max-height:240px;overflow-y:auto;z-index:100;display:none}
.emoji-picker.open{display:block}
.emoji-cat{margin-bottom:10px}
.emoji-cat-title{font-size:11px;color:var(--text2);margin-bottom:6px}
.emoji-grid{display:flex;flex-wrap:wrap;gap:4px}
.emoji-grid span{font-size:22px;cursor:pointer;padding:4px;border-radius:6px;transition:background .15s}
.emoji-grid span:hover{background:rgba(255,255,255,.1)}
/* Invite popup */
.invite-popup{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:200}
.invite-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px 24px;text-align:center;max-width:320px;width:90%;animation:fadeInUp .4s ease}
.invite-card h3{font-size:22px;margin-bottom:8px;color:var(--rose-light)}
.invite-card p{color:var(--text2);margin-bottom:24px}
.invite-btns{display:flex;gap:12px;justify-content:center}
/* Summary */
.summary-card{text-align:center;padding:20px 0}
.summary-pct{font-size:64px;font-weight:bold;background:linear-gradient(135deg,var(--rose-light),var(--rose));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.summary-label{font-size:16px;color:var(--text2);margin-bottom:24px}
.summary-msg{font-size:16px;line-height:1.8;margin-bottom:24px;padding:16px;background:rgba(225,29,72,.08);border-radius:12px;border:1px solid rgba(225,29,72,.15)}
.stat-boxes{display:flex;gap:12px;justify-content:center;margin-bottom:24px}
.stat-box{flex:1;padding:14px;border-radius:12px;text-align:center}
.stat-box .stat-val{font-size:24px;font-weight:bold}
.stat-box .stat-lbl{font-size:12px;color:var(--text2);margin-top:4px}
.stat-box.green{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2)}
.stat-box.green .stat-val{color:var(--green)}
.stat-box.red{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2)}
.stat-box.red .stat-val{color:var(--red)}
.stat-box.blue{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2)}
.stat-box.blue .stat-val{color:var(--blue)}
/* Connecting */
.connecting-text{font-size:18px;color:var(--text2);animation:pulse 1.5s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
/* Responsive */
@media(max-width:380px){.question-text{font-size:16px}.option-btn{padding:12px 14px;font-size:14px}}
</style>
</head>
<body>
<div id="app"></div>
<div id="toasts"></div>
<script>
/* ─── Helpers ─── */
function h(tag, attrs, children) {
  var el = document.createElement(tag);
  if (attrs) {
    for (var k in attrs) {
      var v = attrs[k];
      if (k === 'class') el.className = v;
      else if (k === 'style') el.style.cssText = v;
      else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
      else if (v === false || v == null) continue;
      else if (v === true) el.setAttribute(k, '');
      else el.setAttribute(k, v);
    }
  }
  var kids = Array.isArray(children) ? children : (children != null ? [children] : []);
  for (var i = 0; i < kids.length; i++) {
    var c = kids[i];
    if (c == null || c === false) continue;
    if (typeof c === 'string' || typeof c === 'number') el.appendChild(document.createTextNode(c));
    else el.appendChild(c);
  }
  return el;
}

function clearApp() { document.getElementById('app').innerHTML = ''; }

function showToast(msg) {
  var t = h('div', {class: 'toast'}, msg);
  document.getElementById('toasts').appendChild(t);
  setTimeout(function(){ t.classList.add('show'); }, 10);
  setTimeout(function(){ t.classList.remove('show'); setTimeout(function(){ t.remove(); }, 300); }, 3000);
}

/* ─── Users ─── */
var USERS = {
  soukaina2002: { displayName: 'سكينة', gender: 'female', partner: 'soufiane1996' },
  soufiane1996: { displayName: 'سفيان', gender: 'male', partner: 'soukaina2002' }
};

/* ─── Questions ─── */

function getTopic() {
  var names = [state.myUsername, state.partnerUsername].sort();
  return 'hubban-' + names[0] + '-' + names[1];
}

function adaptQuestion(q) {
  var maleMap = {'{{زوج}}': 'زوجتك', '{{حبيب}}': 'حبيبتك', '{{شريك}}': 'شريكة حياتك', '{{الإنسان}}': 'الإنسانة التي تحبها'};
  var femaleMap = {'{{زوج}}': 'زوجك', '{{حبيب}}': 'حبيبك', '{{شريك}}': 'شريك حياتك', '{{الإنسان}}': 'الإنسان الذي تحبه'};
  var map = state.myGender === 'male' ? maleMap : femaleMap;
  var qText = q.q;
  for (var key in map) {
    qText = qText.split(key).join(map[key]);
  }
  return { id: q.id, cat: q.cat, q: qText, opts: q.opts.slice() };
}

/* ─── State ─── */
var state = {
  myUsername: null, partnerUsername: null,
  myDisplayName: '', partnerDisplayName: '',
  myGender: '', partnerGender: '',
  sseConnection: null, connected: false, partnerOnline: false,
  gamePhase: 'login',
  currentQ: null, myAnswer: -1, partnerAnswer: -1,
  iSubmitted: false, partnerSubmitted: false,
  chatMsgs: [], askedIds: [], questionNum: 0,
  score: { match: 0, total: 0 },
  chatInputFocused: false,
  welcomeStep: 0
};

/* ─── SSE / Messaging ─── */
function connectSSE() {
  if (state.sseConnection) { try { state.sseConnection.close(); } catch(e) {} }
  var topic = getTopic();
  var es = new EventSource('https://ntfy.sh/' + topic + '/sse');
  state.sseConnection = es;
  es.onopen = function() {
    state.connected = true;
    updateConnStatus();
    sendMsg({ type: 'hello', from: state.myUsername, displayName: state.myDisplayName, gender: state.myGender });
  };
  es.onmessage = function(event) {
    try {
      var data = JSON.parse(JSON.parse(event.data).message);
      if (data.from === state.myUsername) return;
      handleMessage(data);
    } catch(e) {}
  };
  es.onerror = function() {
    state.connected = false;
    updateConnStatus();
    es.close();
    setTimeout(function() { if (state.myUsername) connectSSE(); }, 3000);
  };
}

function sendMsg(obj) {
  obj.from = state.myUsername;
  obj.ts = Date.now();
  fetch('https://ntfy.sh/' + getTopic(), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(obj)
  }).catch(function(){});
}

function handleMessage(data) {
  if (data.type === 'hello') {
    state.partnerOnline = true;
    state.partnerDisplayName = data.displayName || '';
    state.partnerGender = data.gender || '';
    updatePartnerStatus();
  } else if (data.type === 'game-invite') {
    if (state.gamePhase === 'lobby') {
      showInvitePopup(data.displayName);
    }
  } else if (data.type === 'game-accept') {
    if (state.gamePhase === 'waiting-accept') {
      state.gamePhase = 'answering';
      sendNextQuestion();
    }
  } else if (data.type === 'game-decline') {
    if (state.gamePhase === 'waiting-accept') {
      state.gamePhase = 'lobby';
      showToast('تم رفض الدعوة');
      renderLobby();
    }
  } else if (data.type === 'game-question') {
    var aq = adaptQuestion(data.question);
    state.currentQ = aq;
    state.questionNum = data.questionNum || 1;
    state.myAnswer = -1;
    state.partnerAnswer = -1;
    state.iSubmitted = false;
    state.partnerSubmitted = false;
    state.chatMsgs = [];
    state.gamePhase = 'answering';
    renderGame();
  } else if (data.type === 'game-answer') {
    if (state.gamePhase === 'answering' || state.gamePhase === 'waiting-partner') {
      state.partnerAnswer = data.answer;
      state.partnerSubmitted = true;
      if (state.iSubmitted && state.gamePhase === 'waiting-partner') {
        showReveal();
      } else if (state.gamePhase === 'answering') {
        renderGame();
      }
    }
  } else if (data.type === 'game-chat') {
    state.chatMsgs.push({ name: data.displayName, content: data.content, ts: data.ts, isMe: false });
    appendChatMsg({ name: data.displayName, content: data.content, ts: data.ts, isMe: false });
  } else if (data.type === 'game-end') {
    state.gamePhase = 'summary';
    renderSummary();
  }
}

/* ─── Login ─── */
function renderLogin() {
  clearApp();
  var app = document.getElementById('app');
  var input = h('input', { type: 'text', placeholder: 'أدخل اسم المستخدم', id: 'loginInput', autocomplete: 'off' });
  var btn = h('button', { class: 'btn btn-primary', style: 'width:100%', onClick: function() { doLogin(); } }, 'دخول');
  var card = h('div', { class: 'login-card' }, [
    h('h1', {}, 'حبّان'),
    h('p', {}, 'لعبة التوافق بين الأزواج'),
    input,
    btn
  ]);
  var screen = h('div', { class: 'screen', id: 'loginScreen' }, [card]);
  app.appendChild(screen);
  input.focus();
  document.getElementById('loginInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });
}

function doLogin() {
  var val = document.getElementById('loginInput').value.trim().toLowerCase();
  if (!USERS[val]) { showToast('اسم المستخدم غير صحيح'); return; }
  var u = USERS[val];
  state.myUsername = val;
  state.partnerUsername = u.partner;
  state.myDisplayName = u.displayName;
  state.myGender = u.gender;
  state.partnerDisplayName = USERS[u.partner].displayName;
  state.partnerGender = USERS[u.partner].gender;
  state.gamePhase = 'connecting';
  renderConnecting();
  connectSSE();
}

      if (state.myUsername === 'soukaina2002') {
        state.gamePhase = 'welcome';
        renderWelcome1();
      } else {
        state.gamePhase = 'lobby';
        renderLobby();
      }
    }
  }, 2000);
}

/* ─── Welcome (soukaina only) ─── */
function renderWelcome1() {
  state.welcomeStep = 1;
  state.gamePhase = 'welcome';
  clearApp();
  var app = document.getElementById('app');
  var text = h('div', { class: 'welcome-text' }, 'أهلا وسهلا سكينة \u2764\uFE0F مرحبا بك في مساحتنا الخاصة لتقوية التعارف بيننا');
  var btn = h('button', { class: 'btn btn-primary', style: 'margin-top:32px', onClick: function() { renderWelcome2(); } }, 'نعم');
  var screen = h('div', { class: 'screen', id: 'welcomeScreen' }, [text, btn]);
  app.appendChild(screen);
}

function renderWelcome2() {
  state.welcomeStep = 2;
  clearApp();
  var app = document.getElementById('app');
  var flowers = ['🌹','🌷','🌸','🌺','🌻','💐','🏵️','🏵️','🌹'];
  var gridItems = [];
  for (var i = 0; i < flowers.length; i++) {
    gridItems.push(h('div', { class: 'flower-item' }, flowers[i]));
  }
  var grid = h('div', { class: 'flower-grid' }, gridItems);
  var title = h('div', { class: 'welcome-text', style: 'font-size:20px;margin-bottom:8px' }, '🌸 هذه الورود هدية لك 🌸');
  var btn = h('button', { class: 'btn btn-primary', style: 'margin-top:20px', onClick: function() { state.welcomeStep = 0; state.gamePhase = 'lobby'; renderLobby(); } }, 'شكراً 🌸');
  var screen = h('div', { class: 'screen', id: 'flowersScreen' }, [title, grid, btn]);
  app.appendChild(screen);
  /* Add floating petals */
  var petals = ['🌸','🌺','🌷','💐','✿','❀'];
  for (var p = 0; p < 12; p++) {
    var petal = h('div', { class: 'floating-petal' }, petals[p % petals.length]);
    petal.style.left = (Math.random() * 100) + '%';
    petal.style.animationDuration = (4 + Math.random() * 6) + 's';
    petal.style.animationDelay = (Math.random() * 5) + 's';
    petal.style.fontSize = (16 + Math.random() * 14) + 'px';
    screen.appendChild(petal);
  }
}

/* ─── Lobby ─── */
function renderLobby() {
  state.gamePhase = 'lobby';
  clearApp();
  var app = document.getElementById('app');
  var onlineDot = state.partnerOnline ? 'online' : 'offline';
  var onlineText = state.partnerOnline ? 'متصل الآن' : 'غير متصل';
  var playBtn = h('button', {
    class: 'btn btn-primary',
    style: 'width:100%;margin-top:20px;font-size:18px;padding:14px',
    disabled: !state.partnerOnline,
    onClick: function() { startGame(); }
  }, 'ابدأ اللعب 🎮');
  var card = h('div', { class: 'lobby-card' }, [
    h('h2', {}, 'حبّان'),
    h('div', { class: 'partner-name' }, state.partnerDisplayName),
    h('div', {}, [
      h('span', { class: 'status-dot ' + onlineDot }),
      h('span', { style: 'color:var(--text2);font-size:14px' }, onlineText)
    ]),
    playBtn,
    h('div', { class: 'conn-status', id: 'connStatus' }, state.connected ? 'متصل بالخادم ✅' : 'جاري الاتصال...')
  ]);
  var screen = h('div', { class: 'screen', id: 'lobbyScreen' }, [card]);
  app.appendChild(screen);
}

function updatePartnerStatus() {
  if (state.gamePhase !== 'lobby') return;
  renderLobby();
}

function updateConnStatus() {
  var el = document.getElementById('connStatus');
  if (el) el.textContent = state.connected ? 'متصل بالخادم ✅' : 'جاري الاتصال...';
}

function startGame() {
  state.gamePhase = 'waiting-accept';
  sendMsg({ type: 'game-invite', displayName: state.myDisplayName });
  showToast('تم إرسال الدعوة لـ' + state.partnerDisplayName);
  renderWaitingAccept();
}

function renderWaitingAccept() {
  clearApp();
  var app = document.getElementById('app');
  var screen = h('div', { class: 'screen', style: 'background:var(--bg)' }, [
    h('div', { class: 'connecting-text' }, 'في انتظار ' + state.partnerDisplayName + '...')
  ]);
  app.appendChild(screen);
}

function showInvitePopup(name) {
  var existing = document.querySelector('.invite-popup');
  if (existing) existing.remove();
  var popup = h('div', { class: 'invite-popup' }, [
    h('div', { class: 'invite-card' }, [
      h('h3', {}, 'دعوة للعب!'),
      h('p', {}, name + ' يدعوك للعب'),
      h('div', { class: 'invite-btns' }, [
        h('button', { class: 'btn btn-primary', onClick: function() { popup.remove(); acceptInvite(); } }, 'قبول ❤️'),
        h('button', { class: 'btn btn-outline', onClick: function() { popup.remove(); declineInvite(); } }, 'رفض')
      ])
    ])
  ]);
  document.body.appendChild(popup);
}

function acceptInvite() {
  state.gamePhase = 'answering';
  sendMsg({ type: 'game-accept' });
  showToast('تم قبول الدعوة');
}

function declineInvite() {
  sendMsg({ type: 'game-decline' });
  showToast('تم رفض الدعوة');
}

/* ─── Game ─── */
function sendNextQuestion() {
  var available = ALL_QUESTIONS.filter(function(q) { return state.askedIds.indexOf(q.id) === -1; });
  if (available.length === 0) {
    sendMsg({ type: 'game-end' });
    state.gamePhase = 'summary';
    renderSummary();
    return;
  }
  var idx = Math.floor(Math.random() * available.length);
  var q = available[idx];
  state.askedIds.push(q.id);
  state.questionNum++;
  var aq = adaptQuestion(q);
  state.currentQ = aq;
  state.myAnswer = -1;
  state.partnerAnswer = -1;
  state.iSubmitted = false;
  state.partnerSubmitted = false;
  state.chatMsgs = [];
  sendMsg({ type: 'game-question', question: q, questionNum: state.questionNum });
  renderGame();
}

function renderGame() {
  clearApp();
  var app = document.getElementById('app');
  if (state.gamePhase === 'answering' || state.gamePhase === 'waiting-partner') {
    renderAnswering(app);
  } else if (state.gamePhase === 'reveal') {
    renderRevealScreen(app);
  }
}

function renderAnswering(app) {
  var q = state.currentQ;
  if (!q) return;
  var header = h('div', { class: 'game-header' }, [
    h('span', { class: 'q-num' }, 'السؤال ' + state.questionNum),
    h('span', { class: 'q-cat' }, q.cat)
  ]);
  var qText = h('div', { class: 'question-text' }, q.q);
  var letters = ['أ','ب','ج','د'];
  var optBtns = [];
  for (var i = 0; i < q.opts.length; i++) {
    var isSelected = (state.myAnswer === i);
    optBtns.push(h('button', {
      class: 'option-btn' + (isSelected ? ' selected' : ''),
      onClick: (function(idx) { return function() { selectAnswer(idx); }; })(i)
    }, [
      h('span', { class: 'opt-letter' }, letters[i]),
      h('span', {}, q.opts[i])
    ]));
  }
  var optsDiv = h('div', { class: 'options-grid' }, optBtns);
  var confirmBtn = h('button', {
    class: 'btn btn-primary',
    style: 'width:100%;margin-top:12px',
    disabled: state.myAnswer === -1 || state.iSubmitted,
    onClick: function() { submitAnswer(); }
  }, state.iSubmitted ? 'تم التسليم ✅' : 'تأكيد الإجابة');
  var bodyContent = [qText, optsDiv, confirmBtn];
  if (state.iSubmitted) {
    bodyContent.push(buildWaitingStatus());
  }
  var body = h('div', { class: 'game-body' }, bodyContent);
  var footer = h('div', { class: 'game-footer' });
  var screen = h('div', { class: 'screen', id: 'gameScreen', style: 'justify-content:flex-start;padding:0' }, [header, body, footer]);
  app.appendChild(screen);
}

function buildWaitingStatus() {
  var myIcon = state.iSubmitted ? '✅' : '⏳';
  var partnerIcon = state.partnerSubmitted ? '✅' : '⏳';
  return h('div', { class: 'waiting-card', style: 'padding:20px 0' }, [
    h('p', { style: 'font-size:16px;color:var(--text)' }, 'تم تسليم إجابتك'),
    h('div', { class: 'waiting-status' }, [
      h('div', { class: 'ws-item' }, [h('div', { class: 'ws-icon' }, myIcon), h('div', { class: 'ws-label' }, state.myDisplayName)]),
      h('div', { class: 'ws-item' }, [h('div', { class: 'ws-icon' }, partnerIcon), h('div', { class: 'ws-label' }, state.partnerDisplayName)])
    ])
  ]);
}

function selectAnswer(idx) {
  if (state.iSubmitted) return;
  state.myAnswer = idx;
  renderGame();
}

function submitAnswer() {
  if (state.myAnswer === -1 || state.iSubmitted) return;
  state.iSubmitted = true;
  sendMsg({ type: 'game-answer', answer: state.myAnswer });
  if (state.partnerSubmitted) {
    showReveal();
  } else {
    state.gamePhase = 'waiting-partner';
    renderGame();
  }
}

/* ─── Reveal ─── */
function showReveal() {
  state.gamePhase = 'reveal';
  if (state.myAnswer === state.partnerAnswer) {
    state.score.match++;
  }
  state.score.total++;
  renderRevealScreen(document.getElementById('app'));
}

function renderRevealScreen(app) {
  clearApp();
  var q = state.currentQ;
  if (!q) return;
  var isMatch = state.myAnswer === state.partnerAnswer;
  var matchClass = isMatch ? 'matched' : 'differed';
  var matchText = isMatch ? '✅ توافق!' : '❌ اختلاف في الرأي';
  var pct = Math.round(((state.score.match / state.score.total) * 100));
  var header = h('div', { class: 'game-header' }, [
    h('span', { class: 'q-num' }, 'السؤال ' + state.questionNum),
    h('span', { class: 'q-cat' }, q.cat)
  ]);
  var qText = h('div', { class: 'question-text', style: 'font-size:16px;margin-bottom:12px' }, q.q);
  var matchInd = h('div', { class: 'match-indicator ' + matchClass }, [matchText, h('span', { style: 'font-size:13px;opacity:.8;margin-right:8px' }, pct + '%')]);
  var myAnsText = (state.myAnswer >= 0 && state.myAnswer < q.opts.length) ? q.opts[state.myAnswer] : '—';
  var partnerAnsText = (state.partnerAnswer >= 0 && state.partnerAnswer < q.opts.length) ? q.opts[state.partnerAnswer] : '—';
  var revealRows = h('div', { class: 'reveal-row' }, [
    h('div', { class: 'reveal-col me-col' }, [h('div', { class: 'who' }, state.myDisplayName), h('div', { class: 'ans' }, myAnsText)]),
    h('div', { class: 'reveal-col partner-col' }, [h('div', { class: 'who' }, state.partnerDisplayName), h('div', { class: 'ans' }, partnerAnsText)])
  ]);
  var revealCard = h('div', { class: 'reveal-card' }, [revealRows]);
  /* Chat section */
  var chatTitle = h('h4', {}, '💬 محادثة حول الإجابة');
  var chatMsgsDiv = h('div', { id: 'gameChatMsgs' });
  for (var ci = 0; ci < state.chatMsgs.length; ci++) {
    chatMsgsDiv.appendChild(buildChatBubble(state.chatMsgs[ci]));
  }
  var chatInput = h('input', { type: 'text', id: 'chatInput', placeholder: 'اكتب رسالة...', style: 'flex:1;padding:10px 14px;border-radius:20px;border:1px solid var(--border);background:#1a1a1a;color:var(--text);font-size:14px;outline:none;font-family:inherit' });
  var emojiBtn = h('button', { id: 'emojiBtn', style: 'width:38px;height:38px;border-radius:50%;border:none;background:var(--rose);color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center', onClick: function() { toggleEmojiPicker(); } }, '😊');
  var inputBar = h('div', { class: 'chat-input-bar' }, [chatInput, emojiBtn]);
  var emojiPicker = buildEmojiPicker();
  var chatSection = h('div', { class: 'chat-section', style: 'position:relative' }, [chatTitle, chatMsgsDiv, emojiPicker, inputBar]);
  var nextBtn = h('button', {
    class: 'btn btn-primary',
    style: 'width:100%;padding:14px;font-size:16px',
    onClick: function() { sendNextQuestion(); }
  }, 'السؤال التالي →');
  var footer = h('div', { class: 'game-footer' }, [nextBtn]);
  var body = h('div', { class: 'game-body' }, [qText, matchInd, revealCard, chatSection]);
  var screen = h('div', { class: 'screen', id: 'gameScreen', style: 'justify-content:flex-start;padding:0' }, [header, body, footer]);
  app.appendChild(screen);
  /* Wire up chat input */
  chatInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChatMsg(); }
  });
  chatInput.addEventListener('focus', function() { state.chatInputFocused = true; });
  chatInput.addEventListener('blur', function() { state.chatInputFocused = false; });
  chatMsgsDiv.scrollTop = chatMsgsDiv.scrollHeight;
}

function buildChatBubble(msg) {
  var cls = msg.isMe ? 'chat-bubble me' : 'chat-bubble them';
  var nameDiv = h('div', { class: 'chat-name' }, msg.name);
  var contentDiv = h('span', {}, msg.content);
  var timeStr = formatTime(msg.ts);
  var timeDiv = h('div', { class: 'chat-time' }, timeStr);
  return h('div', { class: cls }, [nameDiv, contentDiv, timeDiv]);
}

function appendChatMsg(msg) {
  var container = document.getElementById('gameChatMsgs');
  if (!container) return;
  container.appendChild(buildChatBubble(msg));
  container.scrollTop = container.scrollHeight;
}

function sendChatMsg() {
  var input = document.getElementById('chatInput');
  if (!input) return;
  var text = input.value.trim();
  if (!text) return;
  input.value = '';
  var msg = { name: state.myDisplayName, content: text, ts: Date.now(), isMe: true };
  state.chatMsgs.push(msg);
  appendChatMsg(msg);
  sendMsg({ type: 'game-chat', displayName: state.myDisplayName, content: text });
  input.focus();
}

function formatTime(ts) {
  var d = new Date(ts);
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

/* ─── Emoji Picker ─── */
function buildEmojiPicker() {
  var cats = [
    { name: 'قلوب', emojis: ['❤️','💕','💖','💗','💓','💞','💘','💝','💟','♥️','🫶','🥰','😍','🤩','😘','😗','😙','😚','🥺','😍'] },
    { name: 'وجوه', emojis: ['😊','😄','😃','😁','😆','😅','🤣','😂','🙂','😉','😌','😜','🤪','😝','🤑','🤗','🤭','🫣','🤔','😐'] },
    { name: 'إيماءات', emojis: ['👍','👎','👏','🙌','🤝','💪','✌️','🤞','🫶','🙏','🤲','💅','💅','👆','👇','👈','👉','🫂','🤫','🤭'] },
    { name: 'طبيعة', emojis: ['🌸','🌹','🌷','🌺','🌻','💐','🌺','🍀','🌟','⭐','✨','🌙','☀️','🌈','🦋','🌺','🌻','🌸','💐','🌷'] },
    { name: 'رومانسية', emojis: ['💑','👩‍❤️‍👨','💑','💍','💒','🥂','🍷','🎁','💌','🎵','🎶','💕','❤️‍🔥','🫶','💗','💘','💝','💘','💞','🥰'] },
    { name: 'طعام', emojis: ['🍕','🍔','🍟','🌮','🍦','🧁','🍰','🍩','🍫','🍎','🍓','🫐','🍒','🥝','🍇','🍉','🍋','🫒','☕','🧋'] }
  ];
  var catDivs = [];
  for (var i = 0; i < cats.length; i++) {
    var cat = cats[i];
    var spans = [];
    for (var j = 0; j < cat.emojis.length; j++) {
      (function(emoji) {
        spans.push(h('span', { onClick: function(e) { e.stopPropagation(); insertEmoji(emoji); } }, emoji));
      })(cat.emojis[j]);
    }
    catDivs.push(h('div', { class: 'emoji-cat' }, [
      h('div', { class: 'emoji-cat-title' }, cat.name),
      h('div', { class: 'emoji-grid' }, spans)
    ]));
  }
  return h('div', { class: 'emoji-picker', id: 'emojiPicker' }, catDivs);
}

function toggleEmojiPicker() {
  var ep = document.getElementById('emojiPicker');
  if (!ep) return;
  ep.classList.toggle('open');
}

function insertEmoji(emoji) {
  var input = document.getElementById('chatInput');
  if (!input) return;
  var start = input.selectionStart;
  var end = input.selectionEnd;
  var val = input.value;
  input.value = val.substring(0, start) + emoji + val.substring(end);
  input.selectionStart = input.selectionEnd = start + emoji.length;
  input.focus();
}

/* Close emoji picker on outside click */
document.addEventListener('click', function(e) {
  var ep = document.getElementById('emojiPicker');
  var eb = document.getElementById('emojiBtn');
  if (ep && ep.classList.contains('open') && !ep.contains(e.target) && (!eb || !eb.contains(e.target))) {
    ep.classList.remove('open');
  }
});

/* ─── Summary ─── */
function renderSummary() {
  clearApp();
  var app = document.getElementById('app');
  var total = state.score.total;
  var matched = state.score.match;
  var differed = total - matched;
  var pct = total > 0 ? Math.round((matched / total) * 100) : 0;
  var msg = '';
  if (pct === 100) msg = 'توافق مذهل! قلباكما ينبضان بإيقاع واحد ❤️';
  else if (pct >= 80) msg = 'توافق رائع! أنتما شريكان متفاهمان جدًا';
  else if (pct >= 60) msg = 'توافق جميل! حافظا على هذا الحب';
  else if (pct >= 40) msg = 'توافق جيد! الاختلاف يزيد الحب عمقاً';
  else msg = 'الاختلافات جزء من الحب! 😊';
  var header = h('div', { class: 'game-header' }, [h('span', { style: 'font-size:16px;font-weight:bold' }, 'النتيجة النهائية')]);
  var pctDiv = h('div', { class: 'summary-pct' }, pct + '%');
  var label = h('div', { class: 'summary-label' }, matched + ' من ' + total + ' إجابات متطابقة');
  var msgDiv = h('div', { class: 'summary-msg' }, msg);
  var statBoxes = h('div', { class: 'stat-boxes' }, [
    h('div', { class: 'stat-box green' }, [h('div', { class: 'stat-val' }, matched), h('div', { class: 'stat-lbl' }, 'توافق')]),
    h('div', { class: 'stat-box red' }, [h('div', { class: 'stat-val' }, differed), h('div', { class: 'stat-lbl' }, 'اختلاف')]),
    h('div', { class: 'stat-box blue' }, [h('div', { class: 'stat-val' }, total), h('div', { class: 'stat-lbl' }, 'إجمالي')])
  ]);
  var newGameBtn = h('button', {
    class: 'btn btn-primary',
    style: 'width:100%;padding:14px;font-size:16px;margin-top:20px',
    onClick: function() {
      state.askedIds = [];
      state.questionNum = 0;
      state.score = { match: 0, total: 0 };
      state.chatMsgs = [];
      state.currentQ = null;
      state.myAnswer = -1;
      state.partnerAnswer = -1;
      state.iSubmitted = false;
      state.partnerSubmitted = false;
      state.gamePhase = 'lobby';
      renderLobby();
    }
  }, 'لعبة جديدة 🔄');
  var summaryCard = h('div', { class: 'summary-card' }, [pctDiv, label, msgDiv, statBoxes, newGameBtn]);
  var body = h('div', { class: 'game-body', style: 'display:flex;align-items:center;justify-content:center' }, [summaryCard]);
  var footer = h('div', { class: 'game-footer' });
  var screen = h('div', { class: 'screen', id: 'gameScreen', style: 'justify-content:flex-start;padding:0' }, [header, body, footer]);
  app.appendChild(screen);
}

/* ─── Init ─── */
renderLogin();
window.addEventListener('beforeunload', function() {
  if (state.sseConnection) { try { state.sseConnection.close(); } catch(e) {} }
});
</script>
